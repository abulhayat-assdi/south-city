# Production stack (spec §16): app + Postgres + Caddy (auto-TLS).
# Postgres is bound to the internal Docker network only — port 5432 is NEVER
# published to the host (spec §14).
services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: sdph
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: sdph
    volumes:
      - pgdata:/var/lib/postgresql/data
    # NO `ports:` — DB reachable only from the app container.
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U sdph -d sdph']
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_URL: ${AUTH_URL}
      AUTH_TRUST_HOST: 'true'
      UPLOAD_DIR: /app/uploads
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
      NEXT_PUBLIC_WHATSAPP: ${NEXT_PUBLIC_WHATSAPP}
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD}
    volumes:
      - uploads:/app/uploads
    expose:
      - '3000'

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  pgdata:
  uploads:
  caddy_data:
  caddy_config:
